name: Build Android APK Stable
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Initialize Capacitor Android Project
        run: |
          npm install @capacitor/core @capacitor/cli
          npx cap init SafeTune com.safetune.app --web-dir=.
          npm install @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Grant Execute Permissions for Gradle
        run: chmod +x android/gradlew

      - name: Build Debug APK File
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Save APK Artifact to GitHub Actions
        uses: actions/upload-artifact@v3
        with:
          name: SafeTune-v0.5.5-alpha-TestAPK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
