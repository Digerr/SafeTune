<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SafeTune</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d0d0d">
<style>
:root {
    --bg: #0d0d0d; --card: #1a1a1a; --card-hover: #252525;
    --text: #ffffff; --text-sec: #a0a0a0; --accent: #00d4ff;
    --accent-glow: rgba(0, 212, 255, 0.3); --border: #333;
    --radius: 16px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
}
body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    margin: 0; padding: 0; padding-bottom: 80px; overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
}
.splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.6s ease;
}
.splash.hidden { opacity: 0; pointer-events: none; }
.splash-logo { font-size: 36px; font-weight: 800; color: var(--accent); letter-spacing: -1px; margin-bottom: 10px; }
.splash-sub { color: var(--text-sec); font-size: 14px; margin-bottom: 30px; }
.loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.header {
    position: sticky; top: 0; z-index: 100; background: rgba(13, 13, 13, 0.85);
    backdrop-filter: blur(12px); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
}
.logo { font-size: 20px; font-weight: 700; color: var(--text); }
.logo span { color: var(--accent); }
.menu-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer;
}

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
    z-index: 200; transform: translateY(100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column;
}
.overlay.open { transform: translateY(0); }.overlay-header {
    padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
}
.close-btn { background: none; border: none; color: var(--text); font-size: 28px; cursor: pointer; padding: 0; }
.overlay-content { flex: 1; overflow-y: auto; padding: 20px; }

.section-title { font-size: 14px; font-weight: 600; color: var(--text-sec); margin-bottom: 12px; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.btn-option {
    background: var(--card); border: 1px solid var(--border); color: var(--text-sec);
    padding: 12px; border-radius: 12px; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s;
}
.btn-option.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-option.danger.active { background: transparent; border-color: #ff4757; color: #ff4757; }

.container { padding: 20px; max-width: 600px; margin: 0 auto; }
.search-box {
    width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 16px; margin-bottom: 20px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.genre-label { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

.tracks-list { display: flex; flex-direction: column; gap: 12px; }
.track-item {
    display: flex; align-items: center; gap: 12px; background: var(--card); padding: 12px;
    border-radius: var(--radius); border: 1px solid transparent; transition: 0.2s; cursor: pointer;
}
.track-item:hover { border-color: var(--border); }
.track-item:active { transform: scale(0.98); }
.track-cover {
    width: 50px; height: 50px; border-radius: 8px; background: #222;
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden;
}
.track-cover img { width: 100%; height: 100%; object-fit: cover; }
.track-info { flex: 1; min-width: 0; }
.track-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 13px; color: var(--text-sec); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-actions { display: flex; align-items: center; gap: 8px; }
.btn-icon {
    background: none; border: none; color: var(--text-sec); font-size: 20px;
    cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s;
}
.btn-icon:hover { color: var(--text); background: rgba(255,255,255,0.1); }
.btn-icon.liked { color: #ff4757; }
.btn-play { color: var(--accent); }

.load-more-btn {
    width: 100%; padding: 16px; margin-top: 20px; background: var(--card);    border: 1px solid var(--border); color: var(--accent); border-radius: var(--radius);
    font-size: 14px; cursor: pointer; font-weight: 600;
}
.load-more-btn:active { transform: scale(0.98); }
.empty-state { text-align: center; color: var(--text-sec); padding: 40px 0; }

/* MINI PLAYER */
.mini-player {
    position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
    z-index: 150; cursor: pointer; transition: 0.3s;
}
.mini-player.hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
.mini-cover { width: 44px; height: 44px; border-radius: 8px; background: var(--border); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.mini-cover img { width: 100%; height: 100%; object-fit: cover; }
.mini-info { flex: 1; min-width: 0; }
.mini-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-artist { font-size: 12px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-controls { display: flex; gap: 8px; }
.mini-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; padding: 4px; }

/* FULL PLAYER */
.player-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); z-index: 300; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    padding: 20px; box-sizing: border-box;
}
.player-overlay.open { transform: translateY(0); }
.player-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.player-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; }
.player-close { background: none; border: none; color: var(--text); font-size: 28px; cursor: pointer; }

.player-art-container {
    width: 100%; aspect-ratio: 1/1; max-height: 350px; margin-bottom: 30px;
    border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    background: #111; display: flex; align-items: center; justify-content: center;
}
.player-art { width: 100%; height: 100%; object-fit: cover; }
.player-placeholder { font-size: 60px; }

.player-info { text-align: center; margin-bottom: 20px; }
.player-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.player-artist { font-size: 16px; color: var(--text-sec); }
.player-like-large {
    background: none; border: none; font-size: 28px; color: var(--text-sec);
    margin-top: 10px; cursor: pointer; padding: 10px;
}
.player-like-large.liked { color: #ff4757; }
.player-controls-main { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 20px; }
.ctrl-btn { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
.ctrl-play-btn {
    width: 70px; height: 70px; border-radius: 50%; background: var(--accent);
    color: #000; font-size: 28px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow);
}
.progress-container { width: 100%; margin-bottom: 20px; }
.progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; -webkit-appearance: none; outline: none; }
.progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; }
.time-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sec); margin-top: 6px; }

.player-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.detail-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; }
.detail-label { font-size: 11px; color: var(--text-sec); margin-bottom: 4px; }
.detail-value { font-size: 14px; font-weight: 600; color: var(--accent); }

.player-actions { display: flex; gap: 10px; }
.action-btn {
    flex: 1; padding: 14px; background: var(--card); border: none; color: var(--text);
    border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer;
}
</style>
</head>
<body><div class="splash" id="splash">
    <div class="splash-logo">SafeTune</div>
    <div class="splash-sub">Музыка без авторских прав</div>
    <div class="loader"></div>
</div>

<div class="header">
    <div class="logo">Safe<span>Tune</span></div>
    <button class="menu-btn" onclick="toggleMenu(true)">☰ Меню</button>
</div>

<div class="overlay" id="menuOverlay">
    <div class="overlay-header">
        <div class="logo">Меню</div>
        <button class="close-btn" onclick="toggleMenu(false)">✕</button>
    </div>
    <div class="overlay-content">
        <div class="section-title">🎨 Тема</div>
        <div class="grid-2">
            <button class="btn-option active" onclick="setTheme('neon', this)">🔵 Неон</button>
            <button class="btn-option" onclick="setTheme('sunset', this)">🟠 Закат</button>
            <button class="btn-option" onclick="setTheme('matrix', this)">🟢 Матрица</button>
            <button class="btn-option" onclick="setTheme('light', this)">⚪ Светлая</button>
        </div>

        <div class="section-title">🕒 Таймер сна</div>
        <div class="grid-3">
            <button class="btn-option danger active" onclick="setTimer(0, this)">Выкл</button>
            <button class="btn-option" onclick="setTimer(15, this)">15 мин</button>
            <button class="btn-option" onclick="setTimer(30, this)">30 мин</button>
            <button class="btn-option" onclick="setTimer(60, this)">60 мин</button>
        </div>

        <div class="section-title">⚡ Жанры</div>
        <div class="grid-2">
            <button class="btn-option active" onclick="loadGenre('all', this)">🔥 Лучшее</button>
            <button class="btn-option" onclick="loadGenre('rock', this)">🎸 Рок</button>
            <button class="btn-option" onclick="loadGenre('pop', this)"> Поп</button>
            <button class="btn-option" onclick="loadGenre('electronic', this)">🎛️ Электроника</button>
            <button class="btn-option" onclick="loadGenre('hiphop', this)">🎧 Хип-хоп</button>
            <button class="btn-option" onclick="loadGenre('ambient', this)"> Эмбиент</button>
        </div>

        <div class="section-title"> Плейлисты</div>
        <button class="btn-option" onclick="alert('Функция в разработке')" style="width:100%; margin-bottom:10px;">➕ Создать плейлист</button>
        <button class="btn-option" onclick="showPlaylist('favorites')" style="width:100%; margin-bottom:10px; text-align:left; display:flex; align-items:center; gap:10px;">
            ❤️ Избранное <span id="favCountMenu" style="margin-left:auto; opacity:0.5">0</span>
        </button>
        <button class="btn-option" onclick="showPlaylist('history')" style="width:100%; text-align:left; display:flex; align-items:center; gap:10px;">
             История <span id="histCountMenu" style="margin-left:auto; opacity:0.5">0</span>
        </button>
    </div>
</div><div class="container">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск музыки...">
    <div class="genre-label" id="genreLabel">🔥 Популярное</div>
    <div class="tracks-list" id="tracksList"></div>
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">⚡ Подгрузить ещё</button>
</div>

<div class="mini-player hidden" id="miniPlayer" onclick="openFullPlayer()">
    <div class="mini-cover" id="miniCover"></div>
    <div class="mini-info">
        <div class="mini-title" id="miniTitle">Нет трека</div>
        <div class="mini-artist" id="miniArtist">—</div>
    </div>
    <div class="mini-controls">
        <button class="mini-btn" id="miniPlayBtn" onclick="togglePlay(event)">▶</button>
        <button class="mini-btn" onclick="playNext(event)">⏭</button>
    </div>
</div>

<div class="player-overlay" id="playerOverlay">
    <div class="player-top">
        <div class="player-handle"></div>
        <button class="player-close" onclick="minimizePlayer()">✕</button>
    </div>
    
    <div class="player-art-container">
        <img id="playerArt" class="player-art" src="" style="display:none">
        <div id="playerPlaceholder" class="player-placeholder"></div>
    </div>

    <div class="player-info">
        <div class="player-title" id="playerTitle">Название трека</div>
        <div class="player-artist" id="playerArtist">Исполнитель</div>
        <button class="player-like-large" id="playerLikeBtn" onclick="togglePlayerLike()">🤍</button>
    </div>

    <div class="player-controls-main">
        <button class="ctrl-btn" onclick="playPrev()">⏮</button>
        <button class="ctrl-play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="playNext()">⏭</button>
    </div>

    <div class="progress-container">
        <input type="range" class="progress-bar" id="progressBar" value="0" max="100">
        <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="player-details">
        <div class="detail-card">
            <div class="detail-label">Битрейт</div>
            <div class="detail-value" id="metaBitrate">128 kbps</div>
        </div>
        <div class="detail-card">
            <div class="detail-label">Темп</div>
            <div class="detail-value" id="metaBPM">—</div>
        </div>
        <div class="detail-card">
            <div class="detail-label">Тональность</div>
            <div class="detail-value" id="metaKey">—</div>
        </div>
        <div class="detail-card" onclick="downloadTrack()" style="cursor:pointer">
            <div class="detail-label">Скачать</div>
            <div class="detail-value">320 kbps ⬇</div>
        </div>
    </div>

    <div class="player-actions">
        <button class="action-btn" onclick="copyAttribution()"> Атрибуция</button>
        <button class="action-btn" onclick="shareTrack()"> Поделиться</button>
    </div>
</div>

<audio id="audioPlayer" preload="auto"></audio><script>
const CLIENT_ID = '64794605';
let currentGenre = 'all';
let page = 1;
let allTracks = [];
let searchQuery = '';
let isPlaying = false;
let currentTrack = null;
let playQueue = [];
let queueIndex = -1;
let favorites = JSON.parse(localStorage.getItem('safetune_favs') || '[]');
let history = JSON.parse(localStorage.getItem('safetune_hist') || '[]');
let sleepTimer = null;

const audio = document.getElementById('audioPlayer');
const splash = document.getElementById('splash');
const tracksList = document.getElementById('tracksList');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const searchInput = document.getElementById('searchInput');
const playerOverlay = document.getElementById('playerOverlay');
const miniPlayer = document.getElementById('miniPlayer');
const playerLikeBtn = document.getElementById('playerLikeBtn');

window.addEventListener('load', () => {
    fetchTracks();
    updateCounts();
    setTimeout(() => splash.classList.add('hidden'), 800);
});

function setTheme(name, btn) {
    const themes = {
        neon: { bg: '#0d0d0d', card: '#1a1a1a', accent: '#00d4ff', text: '#fff' },
        sunset: { bg: '#1a0f0f', card: '#2a1a1a', accent: '#ff7b54', text: '#ffe6e6' },
        matrix: { bg: '#050a05', card: '#0a140a', accent: '#00ff41', text: '#e0ffe0' },
        light: { bg: '#f0f2f5', card: '#ffffff', accent: '#0066cc', text: '#111' }
    };
    const t = themes[name];
    document.documentElement.style.setProperty('--bg', t.bg);
    document.documentElement.style.setProperty('--card', t.card);
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--text', t.text);
    updateButtons(btn);
}

function setTimer(mins, btn) {
    if (sleepTimer) clearInterval(sleepTimer);
    updateButtons(btn, true);
    if (mins > 0) {
        sleepTimer = setTimeout(() => {
            audio.pause();
            togglePlayUI(false);
            alert('Таймер выключил музыку');
        }, mins * 60 * 1000);
    }
}

function updateButtons(activeBtn, isDanger = false) {
    const parent = activeBtn.parentElement;
    parent.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
    activeBtn.classList.add('active');
}

function toggleMenu(open) {
    document.getElementById('menuOverlay').classList.toggle('open', open);
}function openPlayer(track) {
    currentTrack = track;
    playQueue = allTracks; 
    queueIndex = playQueue.findIndex(t => t.id === track.id);
    
    updatePlayerUI(track);
    audio.src = track.audio;
    audio.play().then(() => togglePlayUI(true)).catch(() => {});
    
    miniPlayer.classList.remove('hidden');
    addToHistory(track);
}

function updatePlayerUI(track) {
    const title = track.title || track.name;
    const artist = track.artist_name || track.creator;
    
    document.getElementById('playerTitle').textContent = title;
    document.getElementById('playerArtist').textContent = artist;
    document.getElementById('miniTitle').textContent = title;
    document.getElementById('miniArtist').textContent = artist;
    
    const coverUrl = track.image || track.album_image;
    const img = document.getElementById('playerArt');
    const placeholder = document.getElementById('playerPlaceholder');
    const miniCover = document.getElementById('miniCover');
    
    if (coverUrl && coverUrl !== 'null' && coverUrl !== '') {
        img.src = coverUrl; img.style.display = 'block'; placeholder.style.display = 'none';
        miniCover.innerHTML = `<img src="${coverUrl}">`;
    } else {
        img.style.display = 'none'; placeholder.style.display = 'block';
        miniCover.innerHTML = '';
    }

    document.getElementById('metaBitrate').textContent = '128 kbps';
    document.getElementById('metaBPM').textContent = track.bpm || '—';
    document.getElementById('metaKey').textContent = track.musicinfo?.keys?.camelot || '—';
    
    updatePlayerLikeUI();
}

function openFullPlayer() {
    if (!currentTrack) return;
    playerOverlay.classList.add('open');
}

function minimizePlayer() {
    playerOverlay.classList.remove('open');
}
function togglePlay() {
    if (!currentTrack) return;
    if (audio.paused) {
        audio.play();
        togglePlayUI(true);
    } else {
        audio.pause();
        togglePlayUI(false);
    }
}

function togglePlayUI(playing) {
    isPlaying = playing;
    const icon = playing ? '' : '▶';
    document.getElementById('playBtn').textContent = icon;
    document.getElementById('miniPlayBtn').textContent = icon;
}

function playNext() {
    if (queueIndex < playQueue.length - 1) {
        queueIndex++;
        openPlayer(playQueue[queueIndex]);
    }
}

function playPrev() {
    if (queueIndex > 0) {
        queueIndex--;
        openPlayer(playQueue[queueIndex]);
    }
}

audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressBar').value = pct;
        document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        document.getElementById('duration').textContent = formatTime(audio.duration);
    }
});

document.getElementById('progressBar').addEventListener('input', (e) => {
    const time = (e.target.value / 100) * audio.duration;
    audio.currentTime = time;
});

audio.addEventListener('ended', playNext);

function formatTime(sec) {    if (!sec) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
                         }async function fetchTracks(isLoadMore = false) {
    if (!isLoadMore) {
        tracksList.innerHTML = '<div class="empty-state"><div class="loader" style="margin:0 auto"></div></div>';
    } else {
        loadMoreBtn.textContent = 'Загрузка...';
        loadMoreBtn.disabled = true;
    }

    let url = `https://api.jamendo.com/v3.0/tracks/?client_id=${CLIENT_ID}&format=json&limit=20&audioformat=mp32&imagesize=300&order=popularity_week`;
    if (currentGenre !== 'all') url += `&tags=${currentGenre}`;
    if (searchQuery) url += `&search=${encodeURIComponent(searchQuery)}`;

    try {
        const res = await fetch(url);
        const data = await res.json();
        const results = data.results || [];

        if (!isLoadMore) {
            allTracks = results;
            tracksList.innerHTML = '';
        } else {
            allTracks = [...allTracks, ...results];
        }

        renderTracks(results, isLoadMore);
        loadMoreBtn.textContent = ' Подгрузить ещё';
        loadMoreBtn.disabled = false;
        loadMoreBtn.style.display = results.length > 0 ? 'block' : 'none';
        page++;
    } catch (err) {
        console.error(err);
        tracksList.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
        loadMoreBtn.style.display = 'none';
    }
}

function renderTracks(newTracks, append = false) {
    newTracks.forEach(track => {
        const div = document.createElement('div');
        div.className = 'track-item';
        const coverHtml = track.image || track.album_image 
            ? `<img src="${track.image || track.album_image}" onerror="this.style.display='none';this.parentElement.textContent='🎵'">` 
            : '';
        const isLiked = favorites.some(f => f.id === track.id);

        div.innerHTML = `
            <div class="track-cover">${coverHtml}</div>
            <div class="track-info">
                <div class="track-name">${track.title || track.name}</div>
                <div class="track-artist">${track.artist_name || track.creator}</div>            </div>
            <div class="track-actions">
                <button class="btn-icon btn-like ${isLiked ? 'liked' : ''}">${isLiked ? '❤️' : '🤍'}</button>
                <button class="btn-icon btn-play">▶</button>
            </div>
        `;

        div.querySelector('.btn-play').onclick = (e) => { e.stopPropagation(); openPlayer(track); };
        div.querySelector('.btn-like').onclick = (e) => { e.stopPropagation(); toggleLike(e, track.id); };
        div.onclick = () => openPlayer(track);
        tracksList.appendChild(div);
    });
}

function loadMore() { fetchTracks(true); }
function loadGenre(g, btn) {
    currentGenre = g;
    updateButtons(btn);
    document.getElementById('genreLabel').textContent = g === 'all' ? '🔥 Популярное' : `🎵 ${g}`;
    page = 1; tracksList.innerHTML = '';
    fetchTracks();
}

let searchTimeout;
searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        searchQuery = e.target.value;
        page = 1; fetchTracks();
    }, 500);
});

function toggleLike(e, id) {
    const btn = e.target;
    const track = allTracks.find(t => t.id === id);
    if (!track) return;
    const index = favorites.findIndex(f => f.id === id);
    if (index === -1) { favorites.push(track); btn.textContent = '❤️'; btn.classList.add('liked'); }
    else { favorites.splice(index, 1); btn.textContent = '🤍'; btn.classList.remove('liked'); }
    localStorage.setItem('safetune_favs', JSON.stringify(favorites));
    updateCounts(); updatePlayerLikeUI();
}

function updatePlayerLikeUI() {
    if (!currentTrack) return;
    const isLiked = favorites.some(f => f.id === currentTrack.id);
    playerLikeBtn.textContent = isLiked ? '❤️' : '🤍';
    playerLikeBtn.classList.toggle('liked', isLiked);
}
function togglePlayerLike() {
    if (!currentTrack) return;
    toggleLike({ target: playerLikeBtn, stopPropagation: () => {} }, currentTrack.id);
}

function updateCounts() {
    document.getElementById('favCountMenu').textContent = favorites.length;
    document.getElementById('histCountMenu').textContent = history.length;
}

function addToHistory(track) {
    history = history.filter(t => t.id !== track.id);
    history.unshift(track);
    if (history.length > 20) history.pop();
    localStorage.setItem('safetune_hist', JSON.stringify(history));
    updateCounts();
}

function showPlaylist(type) {
    toggleMenu(false);
    const list = type === 'favorites' ? favorites : history;
    tracksList.innerHTML = '';
    document.getElementById('genreLabel').textContent = type === 'favorites' ? '❤️ Избранное' : ' История';
    loadMoreBtn.style.display = 'none';
    if (list.length === 0) tracksList.innerHTML = '<div class="empty-state">Список пуст</div>';
    else renderTracks(list);
}

function downloadTrack() {
    if (!currentTrack) return;
    const a = document.createElement('a');
    a.href = currentTrack.audio_download || currentTrack.audio;
    a.download = `${currentTrack.title || 'track'}.mp3`; a.target = '_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function copyAttribution() {
    if (!currentTrack) return;
    const text = `Music: ${currentTrack.title || currentTrack.name} by ${currentTrack.artist_name || currentTrack.creator}\nLicense: CC BY\nSource: Jamendo`;
    navigator.clipboard.writeText(text).then(() => alert('Скопировано!'));
}

function shareTrack() {
    if (navigator.share && currentTrack) {
        navigator.share({ title: currentTrack.title || currentTrack.name, text: `Послушай на SafeTune!`, url: location.href });
    } else { alert('Поделиться не удалось'); }
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});}
</script>
</body>
