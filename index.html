<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="SafeTune — бесплатная музыка для стримов и видео">
  <title>SafeTune</title>
  <link rel="apple-touch-icon" href="/icon-192.png">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #0d0d0d); --tg-text: var(--tg-theme-text-color, #f0f0f0);
      --tg-hint: var(--tg-theme-hint-color, #888); --tg-secondary: var(--tg-theme-secondary-bg-color, #161616);
      --tg-button: var(--tg-theme-button-color, #00e5ff); --tg-button-text: var(--tg-theme-button-text-color, #000);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif; background: var(--tg-bg); color: var(--tg-text);
      overflow-x: hidden; min-height: 100vh; padding-bottom: calc(90px + env(safe-area-inset-bottom));
    }
    body.amoled { --tg-bg: #000000; --tg-secondary: #0a0a0a; }
    body.light { --tg-bg: #ffffff; --tg-text: #1a1a1a; --tg-hint: #777; --tg-secondary: #f5f5f7; --tg-button: #0071e3; --tg-button-text: #fff; }
    
    .splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d0d;
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .splash.fade-out { opacity: 0; transform: scale(1.05); pointer-events: none; }
    .splash-logo { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; color: #00e5ff; letter-spacing: -1px; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0,229,255,0.4); }
    .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #00e5ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    header {
      position: sticky; top: 0; z-index: 100; background: rgba(var(--tg-bg), 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: calc(15px + env(safe-area-inset-top)) 20px 15px 20px;
      display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    body.light header { border-bottom: 1px solid rgba(0,0,0,0.05); }
    .brand { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; color: var(--tg-text); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .brand span { color: var(--tg-button); }
        .header-actions { display: flex; align-items: center; gap: 12px; }
    .icon-btn { background: var(--tg-secondary); border: none; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--tg-text); cursor: pointer; transition: transform 0.2s; }
    .icon-btn:active { transform: scale(0.92); }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }

    .search-wrapper { padding: 15px 20px; }
    .search-bar { background: var(--tg-secondary); border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.02); }
    .search-bar svg { width: 20px; height: 20px; fill: var(--tg-hint); }
    .search-bar input { background: none; border: none; width: 100%; color: var(--tg-text); font-size: 16px; font-weight: 500; outline: none; }
    .search-bar input::placeholder { color: var(--tg-hint); }

    .tabs { display: flex; padding: 5px 20px; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: var(--tg-secondary); color: var(--tg-hint); border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.25s; }
    .tab.active { background: var(--tg-text); color: var(--tg-bg); }

    .container { padding: 20px; }
    .section-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
    
    .track-list { display: flex; flex-direction: column; gap: 10px; }
    .track-card { background: var(--tg-secondary); padding: 12px; border-radius: 18px; display: flex; align-items: center; justify-content: space-between; gap: 14px; transition: background 0.2s; }
    .track-card.active { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.15); }
    .track-thumb { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; background: #222; flex-shrink: 0; }
    .track-info { flex-grow: 1; min-width: 0; }
    .track-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 13px; color: var(--tg-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--tg-hint); margin-top: 2px; }
    .track-cc { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--tg-button); }
    body.light .track-cc { background: rgba(0,0,0,0.05); }
    .track-actions { display: flex; align-items: center; gap: 4px; }
    .action-btn { background: none; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--tg-hint); cursor: pointer; }
    .action-btn.active, .action-btn:active { color: var(--tg-text); }
    .action-btn.liked { color: #ff3b30 !important; }
    .action-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .mini-player {
      position: fixed; bottom: calc(15px + env(safe-area-inset-bottom)); left: 15px; right: 15px;
      background: rgba(22,22,22,0.92); border: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 24px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 500; transform: translateY(150%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    body.light .mini-player { background: rgba(245,245,247,0.92); border: 1px solid rgba(0,0,0,0.04); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .mini-player.open { transform: translateY(0); }
    .mini-progress-bar { position: absolute; bottom: 0; left: 16px; right: 16px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    body.light .mini-progress-bar { background: rgba(0,0,0,0.08); }
    .mini-progress-fill { height: 100%; width: 0%; background: var(--tg-button); }
        .full-player {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--tg-bg);
      z-index: 1000; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column; padding: calc(20px + env(safe-area-inset-top)) 24px calc(30px + env(safe-area-inset-bottom)) 24px;
    }
    .full-player.open { transform: translateY(0); }
    .fp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
    .fp-title { font-size: 16px; font-weight: 600; color: var(--tg-hint); text-transform: uppercase; letter-spacing: 1px; }
    .fp-cover-container { position: relative; width: 100%; aspect-ratio: 1; border-radius: 28px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); background: var(--tg-secondary); }
    .fp-cover { width: 100%; height: 100%; object-fit: cover; }
    .fp-visualizer { position: absolute; bottom: 0; left: 0; width: 100%; height: 100px; pointer-events: none; opacity: 0.7; }
    .fp-meta { margin-bottom: 30px; }
    .fp-track-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fp-track-artist { font-size: 16px; color: var(--tg-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fp-controls-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; margin-bottom: 20px; }
    .fp-main-controls { display: flex; align-items: center; gap: 24px; }
    .play-btn-large { width: 72px; height: 72px; border-radius: 50%; background: var(--tg-text); color: var(--tg-bg); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .play-btn-large svg { width: 32px; height: 32px; fill: currentColor; }
    .slider-container { margin-bottom: 25px; }
    .time-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--tg-hint); font-weight: 500; margin-top: 8px; }
    .range-slider { -webkit-appearance: none; width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; }
    body.light .range-slider { background: rgba(0,0,0,0.1); }
    .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--tg-button); cursor: pointer; }
    
    .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--tg-secondary); border-top: 1px solid rgba(255,255,255,0.05); border-radius: 24px 24px 0 0; z-index: 1100; transform: translateY(100%); transition: transform 0.3s ease; max-height: 80vh; overflow-y: auto; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    .drawer.open { transform: translateY(0); }
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1050; display: none; backdrop-filter: blur(4px); }
    .drawer-overlay.open { display: block; }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .theme-opt-btn { background: rgba(255,255,255,0.03); border: 2px solid transparent; padding: 14px; border-radius: 14px; color: var(--tg-text); font-weight: 600; cursor: pointer; font-size: 14px; }
    body.light .theme-opt-btn { background: rgba(0,0,0,0.03); }
    .theme-opt-btn.active { border-color: var(--tg-button); background: rgba(0,229,255,0.05); }
    .empty-state { text-align: center; color: var(--tg-hint); padding: 40px 20px; font-size: 15px; }
    .loader-inline { display: flex; justify-content: center; padding: 20px; }
  </style>
</head>
<body>

  <div class="splash" id="appSplashScreen">
    <div class="splash-logo">SafeTune</div>
    <div class="spinner"></div>
  </div>

  <header>
    <div class="brand">SafeTune<span>•</span></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openDrawer()"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
    </div>
  </header>
    <div class="search-wrapper">
    <div class="search-bar">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" placeholder="Поиск музыки без АП..." oninput="debounceSearch()">
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-discover" onclick="switchTab('discover')">Обзор</button>
    <button class="tab" id="tab-favorites" onclick="switchTab('favorites')">Избранное</button>
    <button class="tab" id="tab-history" onclick="switchTab('history')">История</button>
  </div>

  <div class="container" id="mainContainer">
    <div class="section-title"><span id="sectionTitleText">Новинки</span></div>
    <div class="track-list" id="trackListContainer"></div>
    <div class="loader-inline" id="mainLoader" style="display:none;"><div class="spinner"></div></div>
  </div>

  <div class="mini-player" id="miniPlayer" onclick="openFullPlayer()">
    <img src="" class="track-thumb" id="mpThumb">
    <div class="track-info" style="margin-left:12px;">
      <div class="track-title" id="mpTitle">Название трека</div>
      <div class="track-artist" id="mpArtist">Исполнитель</div>
    </div>
    <div class="track-actions" onclick="event.stopPropagation()">
      <button class="action-btn" id="mpPlayBtn" onclick="togglePlay()"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    </div>
    <div class="mini-progress-bar"><div class="mini-progress-fill" id="mpProgressFill"></div></div>
  </div>

  <div class="full-player" id="fullPlayer">
    <div class="fp-header">
      <button class="icon-btn" onclick="closeFullPlayer()"><svg viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button>
      <div class="fp-title">Сейчас играет</div>
      <button class="icon-btn" id="fpFavBtn"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
    </div>
    <div class="fp-cover-container">
      <img src="" class="fp-cover" id="fpCover">
      <canvas class="fp-visualizer" id="visualizerCanvas"></canvas>
    </div>
    <div class="fp-meta">
      <div class="fp-track-title" id="fpTitle">Название трека</div>
      <div class="fp-track-artist" id="fpArtist">Исполнитель</div>
    </div>
    <div class="slider-container">
      <input type="range" class="range-slider" id="fpSlider" value="0" min="0" step="1" oninput="seekAudio(this.value)">
      <div class="time-row"><span id="fpTimeCurrent">0:00</span><span id="fpTimeTotal">0:00</span></div>
    </div>
    <div class="fp-controls-row">
      <button class="action-btn" id="fpSleepBtn" onclick="openSleepDrawer()" style="font-weight:600; font-size:12px; width:auto; padding:0 10px; border-radius:12px; background:var(--tg-secondary);">Сон</button>
      <div class="fp-main-controls">
        <button class="action-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="play-btn-large" id="fpPlayBtn" onclick="togglePlay()"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="action-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg></button>
      </div>
      <button class="action-btn" id="fpDownloadBtn"><svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg></button>
    </div>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer(); closeSleepDrawer();"></div>
  
  <div class="drawer" id="sideDrawer">
    <div class="drawer-header"><h3>Настройки и Меню</h3><button class="icon-btn" onclick="closeDrawer()">✕</button></div>
    <div style="margin-top:15px;">
      <h4 style="color:var(--tg-hint); font-size:13px; text-transform:uppercase;">Тема оформления</h4>
      <div class="theme-grid">
        <button class="theme-opt-btn" id="th-" onclick="setTheme('')">TG Нативная</button>
        <button class="theme-opt-btn" id="th-amoled" onclick="setTheme('amoled')">Amoled</button>
        <button class="theme-opt-btn" id="th-light" onclick="setTheme('light')">Светлая</button>
      </div>
    </div>
  </div>
    <div class="drawer" id="sleepDrawer" style="z-index:1200;">
    <div class="drawer-header"><h3>Таймер сна</h3><button class="icon-btn" onclick="closeSleepDrawer()">✕</button></div>
    <div class="theme-grid">
      <button class="theme-opt-btn" onclick="setSleepTimer(0)">Выкл</button>
      <button class="theme-opt-btn" onclick="setSleepTimer(5)">5 мин</button>
      <button class="theme-opt-btn" onclick="setSleepTimer(15)">15 мин</button>
      <button class="theme-opt-btn" onclick="setSleepTimer(30)">30 - мин</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if(tg) { tg.ready(); tg.expand(); if(tg.enableVerticalSwipes) tg.enableVerticalSwipes(); }

    const JAMENDO_CLIENT_ID = '64794605';
    let currentTab = 'discover';
    let tracks = []; // Хранит выдачу для текущей страницы поиска/обзора
    let currentPlayingQueue = []; // Выделенная независимая очередь воспроизведения для плеера!
    let currentTrackIndex = -1;
    let audio = new Audio();
    let audioContext = null, audioSource = null, analyser = null;
    let isPlaying = false;
    let searchTimeout = null;
    let currentPage = 1, hasMoreTracks = true, isLoadingMore = false;
    let favorites = JSON.parse(localStorage.getItem('st_favs') || '[]');
    let historyTracks = JSON.parse(localStorage.getItem('st_hist') || '[]');
    let sleepTimeout = null, sleepInterval = null;

    audio.crossOrigin = "anonymous";

    // Инициализация Web Audio API с обходом блокировок Safari/iOS
    function initVisualizer() {
      if (audioContext) return;
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextClass();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        audioSource = audioContext.createMediaElementSource(audio);
        audioSource.connect(analyser);
        analyser.connect(audioContext.destination);
        startVisualizerRender();
      } catch(e) { console.error("Визуализатор недоступен:", e); }
    }

    function startVisualizerRender() {
      const canvas = document.getElementById('visualizerCanvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      
      function draw() {
        requestAnimationFrame(draw);
        if(!isPlaying) return;
        const w = canvas.width = canvas.clientWidth;
        const h = canvas.height = canvas.clientHeight;
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0, 0, w, h);
        const barWidth = (w / bufferLength) * 1.4;
        let barHeight, x = 0;
        for(let i=0; i<bufferLength; i++) {
          barHeight = dataArray[i] * 0.4;
          ctx.fillStyle = `rgba(0, 229, 255, ${barHeight/100 + 0.1})`;
          ctx.fillRect(x, h - barHeight, barWidth - 2, barHeight);
          x += barWidth;
        }
      }
      draw();
    }
        function playTrackById(id, sourceListType) {
      // Клик по треку оживляет контекст на смартфонах
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
      
      // Запоминаем из какого списка играет плеер и фиксируем очередь
      if (sourceListType === 'favorites') {
        currentPlayingQueue = [...favorites];
      } else if (sourceListType === 'history') {
        currentPlayingQueue = [...historyTracks];
      } else {
        currentPlayingQueue = [...tracks];
      }

      const idx = currentPlayingQueue.findIndex(t => t.id === id);
      if(idx === -1) return;
      currentTrackIndex = idx;
      const track = currentPlayingQueue[currentTrackIndex];

      initVisualizer();
      
      // Плавное затухание (Fade out) перед сменой трека
      if(isPlaying) {
        let vol = audio.volume;
        const fade = setInterval(() => {
          if(vol > 0.1) { vol -= 0.1; audio.volume = vol; }
          else { clearInterval(fade); processPlay(track); }
        }, 30);
      } else {
        processPlay(track);
      }
    }

    function processPlay(track) {
      audio.src = track.audio || track.audio_download;
      audio.volume = 1.0;
      audio.play().then(() => { isPlaying = true; updatePlayerUI(); }).catch(e => console.log("Ошибка старта:", e));
      
      // Пушим в историю
      historyTracks = historyTracks.filter(t => t.id !== track.id);
      historyTracks.unshift(track);
      if(historyTracks.length > 50) historyTracks.pop();
      localStorage.setItem('st_hist', JSON.stringify(historyTracks));
      
      if(!favorites.some(t => t.id === track.id)) {
        if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
      updateMediaSession(track);
    }

    function togglePlay() {
      if(!audio.src) return;
      if(isPlaying) {
        audio.pause(); isPlaying = false;
      } else {
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        audio.play(); isPlaying = true;
      }
      updatePlayerUI();
    }

    function nextTrack() {
      if(currentPlayingQueue.length === 0 || currentTrackIndex === -1) return;
      currentTrackIndex = (currentTrackIndex + 1) % currentPlayingQueue.length;
      processPlay(currentPlayingQueue[currentTrackIndex]);
    }

    function prevTrack() {
      if(currentPlayingQueue.length === 0 || currentTrackIndex === -1) return;
      currentTrackIndex = (currentTrackIndex - 1 + currentPlayingQueue.length) % currentPlayingQueue.length;
      processPlay(currentPlayingQueue[currentTrackIndex]);
    }

    function seekAudio(val) { audio.currentTime = val; }

    audio.ontimeupdate = () => {
      if(!audio.duration) return;
      const cur = audio.currentTime; const dur = audio.duration;
      document.getElementById('mpProgressFill').style.width = `${(cur/dur)*100}%`;
      const slider = document.getElementById('fpSlider');
      slider.max = Math.floor(dur); slider.value = Math.floor(cur);
      document.getElementById('fpTimeCurrent').textContent = formatTime(cur);
      document.getElementById('fpTimeTotal').textContent = formatTime(dur);
    };

    audio.onended = () => { nextTrack(); };
        function updatePlayerUI() {
      if(currentTrackIndex === -1 || currentPlayingQueue.length === 0) return;
      const track = currentPlayingQueue[currentTrackIndex];
      
      document.getElementById('miniPlayer').classList.add('open');
      document.getElementById('mpTitle').textContent = track.name;
      document.getElementById('mpArtist').textContent = track.artist_name || 'Без автора';
      document.getElementById('mpThumb').src = track.image || 'https://placehold.co/150x150/161616/fff?text=Music';
      
      document.getElementById('fpTitle').textContent = track.name;
      document.getElementById('fpArtist').textContent = track.artist_name || 'Без автора';
      document.getElementById('fpCover').src = track.image || 'https://placehold.co/500x500/161616/fff?text=Music';

      const pBtnSvg = `<svg viewBox="0 0 24 24"><path d="${isPlaying ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z' : 'M8 5v14l11-7z'}"/></svg>`;
      document.getElementById('mpPlayBtn').innerHTML = pBtnSvg;
      document.getElementById('fpPlayBtn').innerHTML = pBtnSvg;

      const isFav = favorites.some(t => t.id === track.id);
      document.getElementById('fpFavBtn').className = `icon-btn ${isFav ? 'liked' : ''}`;
      document.getElementById('fpFavBtn').onclick = () => toggleLike(track);
      document.getElementById('fpDownloadBtn').onclick = () => download(track.audio_download || track.audio, track.name);
      
      // Подсветка активной карточки трека во всех списках
      document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
      const activeCard = document.getElementById(`track-${track.id}`) || document.getElementById(`fav-track-${track.id}`) || document.getElementById(`hist-track-${track.id}`);
      if(activeCard) activeCard.classList.add('active');
    }

    function renderTrack(t, listPrefix = 'track', sourceListType = 'discover') {
      const isFav = favorites.some(f => f.id === t.id);
      const isActive = currentTrackIndex !== -1 && currentPlayingQueue[currentTrackIndex]?.id === t.id;
      return `
        <div class="track-card ${isActive ? 'active' : ''}" id="${listPrefix}-${t.id}" onclick="playTrackById('${t.id}', '${sourceListType}')">
          <img src="${t.image || 'https://placehold.co/150x150/161616/fff?text=Music'}" class="track-thumb">
          <div class="track-info">
            <div class="track-title">${t.name}</div>
            <div class="track-artist">${t.artist_name}</div>
            <div class="track-meta"><span class="track-cc">CC</span> <span>${formatTime(t.duration)}</span></div>
          </div>
          <div class="track-actions" onclick="event.stopPropagation()">
            <button class="action-btn ${isFav ? 'liked' : ''}" id="${listPrefix}-btn-${t.id}" onclick="toggleLikeById('${t.id}')">
              <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
          </div>
        </div>
      `;
    }

    function toggleLikeById(id) {
      let track = tracks.find(t => t.id === id) || favorites.find(t => t.id === id) || historyTracks.find(t => t.id === id);
      if(track) toggleLike(track);
    }

    function toggleLike(track) {
      if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      const idx = favorites.findIndex(f => f.id === track.id);
      if(idx > -1) favorites.splice(idx, 1); else favorites.push(track);
      localStorage.setItem('st_favs', JSON.stringify(favorites));
      
      // Динамически переключаем классы лайка по уникальным ID префиксов
      ['track-btn-', 'fav-track-btn-', 'hist-track-btn-'].forEach(pref => {
        const el = document.getElementById(pref + track.id);
        if(el) el.classList.toggle('liked', idx === -1);
      });
      if(currentTrackIndex !== -1 && currentPlayingQueue[currentTrackIndex]?.id === track.id) {
        document.getElementById('fpFavBtn').classList.toggle('liked', idx === -1);
      }
      if(currentTab === 'favorites') loadFavoritesTab();
    }

    function loadTracks(more = false) {
      if(isLoadingMore) return;
      isLoadingMore = true;
      document.getElementById('mainLoader').style.display = 'flex';
      const q = document.getElementById('searchInput').value;
      const url = `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_CLIENT_ID}&format=json&limit=15&offset=${(currentPage-1)*15}&imagesize=200&tags=${q ? '' : 'electronic,chill,cinematic'}&search=${encodeURIComponent(q)}`;
      
      fetch(url).then(r => r.json()).then(res => {
        const newTracks = res.results || [];
        hasMoreTracks = newTracks.length === 15;
        if(more) tracks = [...tracks, ...newTracks]; else tracks = newTracks;
        
        const container = document.getElementById('trackListContainer');
        if(tracks.length === 0) {
          container.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
        } else {
          container.innerHTML = tracks.map(t => renderTrack(t, 'track', 'discover')).join('');
        }
        updatePlayerUI();
      }).catch(e => console.log(e))
      .finally(() => { isLoadingMore = false; document.getElementById('mainLoader').style.display = 'none'; });
    }

    function debounceSearch() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentPage = 1; loadTracks(); }, 400); }

    function switchTab(t) {
      currentTab = t;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${t}`).classList.add('active');
      const title = document.getElementById('sectionTitleText');
      const container = document.getElementById('trackListContainer');
      
      if(t === 'discover') { title.textContent = 'Обзор'; loadTracks(); }
      else if(t === 'favorites') { title.textContent = 'Избранное'; loadFavoritesTab(); }
      else if(t === 'history') { title.textContent = 'История'; loadHistoryTab(); }
    }

    function loadFavoritesTab() {
      const container = document.getElementById('trackListContainer');
      if(favorites.length === 0) container.innerHTML = '<div class="empty-state">У вас пока нет избранных треков</div>';
      else container.innerHTML = favorites.map(t => renderTrack(t, 'fav-track', 'favorites')).join('');
      updatePlayerUI();
    }

    function loadHistoryTab() {
      const container = document.getElementById('trackListContainer');
      if(historyTracks.length === 0) container.innerHTML = '<div class="empty-state">История прослушивания пуста</div>';
      else container.innerHTML = historyTracks.map(t => renderTrack(t, 'hist-track', 'history')).join('');
      updatePlayerUI();
    }

    function formatTime(s) { if(isNaN(s)) return '0:00'; const m = Math.floor(s/60); const r = Math.floor(s%60); return `${m}:${r<10?'0':''}${r}`; }
    function openFullPlayer() { document.getElementById('fullPlayer').classList.add('open'); }
    function closeFullPlayer() { document.getElementById('fullPlayer').classList.remove('open'); }
    function openDrawer() { document.getElementById('sideDrawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
    function closeDrawer() { document.getElementById('sideDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
    function openSleepDrawer() { document.getElementById('sleepDrawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
    function closeSleepDrawer() { document.getElementById('sleepDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }

    function setSleepTimer(m) {
      clearTimeout(sleepTimeout);
      clearInterval(sleepInterval);
      const btn = document.getElementById('fpSleepBtn');
      if(m === 0) { btn.textContent = "Сон"; closeSleepDrawer(); return; }
      
      let timeLeft = m * 60;
      btn.textContent = formatTime(timeLeft);
      
      sleepInterval = setInterval(() => {
        timeLeft--;
        if(timeLeft <= 0) { btn.textContent = "Сон"; clearInterval(sleepInterval); } 
        else { btn.textContent = formatTime(timeLeft); }
      }, 1000);

      sleepTimeout = setTimeout(() => {
        audio.pause(); isPlaying = false; updatePlayerUI();
      }, m * 60 * 1000);
      closeSleepDrawer();
    }

    function setTheme(t) { document.body.className = t; localStorage.setItem('theme', t); updateThemeActiveButton(t); }
    function updateThemeActiveButton(t) { document.querySelectorAll('.theme-opt-btn').forEach(b => b.classList.remove('active')); document.getElementById(`th-${t}`).classList.add('active'); }

    function download(url, name) {
      if(!url) return;
      const a = document.createElement('a'); a.href = url;
      a.download = name.trim().replace(/[^a-zA-Z0-9а-яА-Я ]/g,"") + '.mp3';
      a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function updateMediaSession(t) {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: t.name, artist: t.artist_name,
          artwork: [{ src: t.image || 'https://placehold.co/500x500/161616/fff?text=Music', sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', togglePlay);
        navigator.mediaSession.setActionHandler('pause', togglePlay);
        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
      }
    }

    window.onload = () => {
      const savedTheme = localStorage.getItem('theme') || '';
      document.body.className = savedTheme; updateThemeActiveButton(savedTheme);
      loadTracks();
      
      window.onscroll = () => {
        if((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300) {
          if(!isLoadingMore && hasMoreTracks && currentTab === 'discover') { currentPage++; loadTracks(true); }
        }
      };
      
      const s = document.getElementById('appSplashScreen');
      if(s) { setTimeout(() => { s.classList.add('fade-out'); setTimeout(() => s.remove(), 500); }, 1500); }
    };

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(e => console.log(e)); }); }
  </script>
</body>
</html>
