<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="description" content="SafeTune — бесплатная музыка для стримов и видео">
  <title>SafeTune</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── ПЕРЕМЕННЫЕ ─────────────────────────────────── */
    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --surface2: #1e1e1e;
      --surface3: #272727;
      --accent:   #c8ff00;
      --accent2:  #00e5b4;
      --text:     #f0f0f0;
      --text2:    #888;
      --text3:    #555;
      --r:        14px;
      --r-sm:     8px;
      --player-h: 76px;
      --header-h: 60px;
    }
    body.theme-neon   { --accent: #ff2d87; --accent2: #bf00ff; }
    body.theme-warm   { --accent: #ff8c00; --accent2: #ff4f00; }
    body.theme-ice    { --accent: #00cfff; --accent2: #0080ff; }

    /* ── СБРОС ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      padding-bottom: calc(var(--player-h) + 20px);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input  { font-family: inherit; outline: none; }
    img    { display: block; }
    a      { color: inherit; text-decoration: none; }

    /* ── ХЭДЕР ──────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--header-h);
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      letter-spacing: -0.5px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 16px; height: 16px; }
    .menu-toggle {
      width: 40px; height: 40px;
      border-radius: var(--r-sm);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .menu-toggle:hover { background: var(--surface3); }
    .menu-toggle svg { width: 20px; height: 20px; stroke: var(--text); }

    /* ── БОКОВАЯ ПАНЕЛЬ / НАСТРОЙКИ ─────────────────── */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 80;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 0 16px 32px;
      z-index: 81;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,.72,0,1);
      max-height: 90dvh;
      overflow-y: auto;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      margin: 12px auto 20px;
    }
    .drawer-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 20px;
    }
    .drawer-section { margin-bottom: 24px; }
    .drawer-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }
    /* Темы */
    .theme-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .theme-dot {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      position: relative;
      transition: transform .15s;
    }
    .theme-dot:hover { transform: scale(1.05); }
    .theme-dot.active::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      color: #000;
      font-weight: 700;
    }
    .theme-dot.active { border-color: var(--text); }
    .td-default { background: #c8ff00; }
    .td-neon    { background: #ff2d87; }
    .td-warm    { background: #ff8c00; }
    .td-ice     { background: #00cfff; }

    /* Жанры в drawer */
    .genre-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .genre-pill {
      padding: 8px 14px;
      border-radius: 30px;
      background: var(--surface2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .genre-pill:hover { background: var(--surface3); }
    .genre-pill.active {
      background: var(--accent);
      color: #000;
      border-color: transparent;
    }

    /* Кнопка избранного */
    .drawer-fav-btn {
      width: 100%;
      padding: 13px;
      border-radius: var(--r);
      background: var(--surface2);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .drawer-fav-btn:hover { background: var(--surface3); }

    /* ── MAIN ───────────────────────────────────────── */
    main { max-width: 680px; margin: 0 auto; padding: 20px 14px 0; }

    /* Hero */
    .hero {
      text-align: center;
      padding: 28px 0 24px;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.05;
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }
    .hero-title span { color: var(--accent); }
    .hero-sub {
      color: var(--text2);
      font-size: 14px;
    }

    /* Поиск */
    .search-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--text3);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--r);
      padding: 13px 48px 13px 44px;
      color: var(--text);
      font-size: 15px;
      transition: border-color .2s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--accent); }
    .search-clear {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface3);
      display: none;
      align-items: center; justify-content: center;
    }
    .search-clear.visible { display: flex; }
    .search-clear svg { width: 14px; height: 14px; stroke: var(--text2); }

    /* Горизонтальный скролл жанров */
    .genre-scroll-wrap {
      margin: 0 -14px 20px;
      padding: 0 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .genre-scroll-wrap::-webkit-scrollbar { display: none; }
    .genre-scroll {
      display: flex;
      gap: 8px;
      width: max-content;
    }
    .genre-tab {
      padding: 8px 16px;
      border-radius: 30px;
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }
    .genre-tab:hover { background: var(--surface2); }
    .genre-tab.active {
      background: var(--accent);
      color: #000;
      border-color: transparent;
      font-weight: 600;
    }

    /* Заголовок раздела */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-count {
      font-size: 12px;
      color: var(--text3);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
    }

    /* ── СПИСОК ТРЕКОВ ──────────────────────────────── */
    #track-list { display: flex; flex-direction: column; gap: 6px; }

    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--r);
      padding: 10px 12px;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s;
      cursor: pointer;
      position: relative;
    }
    .track:hover { background: var(--surface2); }
    .track.active {
      background: var(--surface2);
      border-color: rgba(200,255,0,0.15);
    }
    .track.active .t-name { color: var(--accent); }

    .track-num {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      min-width: 22px;
      text-align: center;
    }
    .track.active .track-num { display: none; }
    .mini-eq {
      display: none;
      min-width: 22px;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 16px;
    }
    .track.active .mini-eq { display: flex; }
    .mini-eq span {
      display: block;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      height: 4px;
    }
    .mini-eq span:nth-child(1) { animation: eq1 .7s ease-in-out infinite alternate; }
    .mini-eq span:nth-child(2) { animation: eq1 .5s ease-in-out infinite alternate .15s; }
    .mini-eq span:nth-child(3) { animation: eq1 .9s ease-in-out infinite alternate .3s; }
    @keyframes eq1 { to { height: 16px; } }
    .track.paused .mini-eq span { animation-play-state: paused; }

    .t-cover {
      width: 48px; height: 48px;
      border-radius: var(--r-sm);
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface3);
    }
    .t-info { flex: 1; min-width: 0; }
    .t-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .t-artist {
      color: var(--text2);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .t-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .t-dur {
      font-size: 12px;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
      min-width: 32px;
      text-align: right;
      margin-right: 4px;
    }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    .icon-btn svg { width: 16px; height: 16px; stroke: var(--text2); }
    .icon-btn:hover { background: var(--surface3); }
    .icon-btn:hover svg { stroke: var(--text); }
    .icon-btn.fav-btn.active svg { stroke: #ff4d6d; fill: #ff4d6d; }
    .icon-btn.play-btn {
      background: var(--accent);
      width: 36px; height: 36px;
    }
    .icon-btn.play-btn svg { stroke: #000; fill: none; width: 15px; height: 15px; }
    .icon-btn.play-btn:hover { filter: brightness(1.1); }

    /* Skeleton */
    .skeleton-track {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--r);
      padding: 10px 12px;
      margin-bottom: 6px;
    }
    .skel {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-cover { width: 48px; height: 48px; border-radius: var(--r-sm); flex-shrink: 0; }
    .skel-info  { flex: 1; }
    .skel-name  { height: 13px; width: 60%; margin-bottom: 7px; }
    .skel-art   { height: 11px; width: 40%; }
    .skel-dur   { width: 28px; height: 11px; border-radius: 4px; }

    /* Empty / Error */
    .state-msg {
      text-align: center;
      padding: 50px 20px;
      color: var(--text3);
    }
    .state-msg svg { width: 40px; height: 40px; stroke: var(--text3); margin: 0 auto 12px; }
    .state-msg p { font-size: 14px; }
    .state-msg button {
      margin-top: 14px;
      padding: 10px 20px;
      border-radius: 30px;
      background: var(--surface2);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      transition: background .15s;
    }
    .state-msg button:hover { background: var(--surface3); }

    /* Load more */
    .load-more-wrap { text-align: center; margin: 20px 0 10px; }
    .load-more-btn {
      padding: 11px 28px;
      border-radius: 30px;
      background: var(--surface2);
      font-size: 14px;
      font-weight: 500;
      transition: background .15s;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .load-more-btn:hover { background: var(--surface3); }
    .load-more-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── МИНИ-ПЛЕЕР (нижняя полоса) ────────────────── */
    .mini-player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--player-h);
      background: rgba(18,18,18,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: none;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      z-index: 50;
      cursor: pointer;
    }
    .mini-player.visible { display: flex; }

    .mp-cover {
      width: 46px; height: 46px;
      border-radius: var(--r-sm);
      object-fit: cover;
      flex-shrink: 0;
    }
    .mp-info { flex: 1; min-width: 0; }
    .mp-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mp-artist {
      font-size: 12px;
      color: var(--text2);
    }

    /* Прогресс в мини-плеере */
    .mp-progress {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--surface3);
    }
    .mp-progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .5s linear;
    }

    .mp-controls { display: flex; align-items: center; gap: 4px; }
    .mp-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .mp-btn:hover { background: rgba(255,255,255,0.07); }
    .mp-btn svg { width: 18px; height: 18px; stroke: var(--text); fill: none; }
    .mp-play {
      background: var(--accent);
      width: 40px; height: 40px;
    }
    .mp-play svg { stroke: #000; width: 17px; height: 17px; }
    .mp-play:hover { filter: brightness(1.1); background: var(--accent); }

    /* ── ПОЛНЫЙ ПЛЕЕР (модалка) ─────────────────────── */
    .full-player {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 30px;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.32,.72,0,1);
    }
    .full-player.open { transform: translateY(0); }

    .fp-topbar {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 20px;
    }
    .fp-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
    }
    .fp-close svg { width: 18px; height: 18px; stroke: var(--text2); }
    .fp-close:hover { background: var(--surface3); }
    .fp-label { font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; }

    .fp-cover-wrap {
      width: min(75vw, 300px);
      aspect-ratio: 1;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 28px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .fp-cover {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    /* Эквалайзер на обложке */
    .fp-eq {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 24px;
      opacity: 0;
      transition: opacity .3s;
    }
    .full-player.playing .fp-eq { opacity: 1; }
    .fp-eq span {
      display: block;
      width: 4px;
      background: #fff;
      border-radius: 3px;
      height: 4px;
    }
    .fp-eq span:nth-child(1) { animation: eq1 .6s ease-in-out infinite alternate; }
    .fp-eq span:nth-child(2) { animation: eq1 .9s ease-in-out infinite alternate .1s; }
    .fp-eq span:nth-child(3) { animation: eq1 .5s ease-in-out infinite alternate .25s; }
    .fp-eq span:nth-child(4) { animation: eq1 .8s ease-in-out infinite alternate .05s; }
    .fp-eq span:nth-child(5) { animation: eq1 .7s ease-in-out infinite alternate .2s; }
    .full-player.paused .fp-eq span { animation-play-state: paused; }

    .fp-meta {
      width: 100%;
      max-width: 360px;
      text-align: center;
      margin-bottom: 24px;
    }
    .fp-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fp-artist { color: var(--text2); font-size: 14px; }

    /* Ползунок прогресса */
    .fp-seek-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 20px;
    }
    .fp-seek {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .fp-seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(200,255,0,0.3);
      transition: box-shadow .2s;
    }
    .fp-seek:active::-webkit-slider-thumb { box-shadow: 0 0 0 6px rgba(200,255,0,0.2); }
    .fp-seek::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      cursor: pointer;
    }
    .fp-times {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }

    /* Управление плеером */
    .fp-controls {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 28px;
    }
    .fp-ctrl {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-item
