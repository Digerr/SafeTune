<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeTune</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; 
      color: #fff; 
      font-family: Arial, sans-serif; 
      padding: 20px;
    }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: #00e5ff; font-size: 2.5rem; }
    .section { margin-bottom: 30px; }
    .section-title { 
      font-size: 1.3rem; 
      margin-bottom: 15px; 
      color: #00e5ff;
      border-left: 3px solid #00e5ff;
      padding-left: 10px;
    }
    .track { 
      background: #1a1a1a; 
      padding: 12px; 
      margin-bottom: 10px; 
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .track img { width: 50px; height: 50px; border-radius: 5px; }
    .track-info { flex: 1; }
    .track-name { font-weight: bold; margin-bottom: 3px; }
    .track-artist { color: #999; font-size: 0.9rem; }
    .btn {
      background: #00e5ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .error { 
      background: #300; 
      color: #f66; 
      padding: 15px;       border-radius: 8px; 
      margin: 20px 0;
      border: 1px solid #f66;
    }
    .loading { text-align: center; padding: 40px; color: #666; }
    #debug { 
      background: #222; 
      color: #0f0; 
      padding: 10px; 
      margin-bottom: 20px; 
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div id="debug">🔧 Инициализация...</div>

<div class="header">
  <h1>🎵 SafeTune</h1>
  <p style="color: #999; margin-top: 10px;">Безопасная музыка для контента</p>
</div>

<div id="error-container"></div>

<div class="section">
  <div class="section-title">🔥 Популярное сейчас</div>
  <div id="popular-list">
    <div class="loading">Загрузка треков...</div>
  </div>
</div>

<script>
const debug = document.getElementById('debug');
const API_KEY = '64794605';

function log(msg) {
  debug.textContent = '✅ ' + msg;
  console.log(msg);
}

function showError(msg) {
  document.getElementById('error-container').innerHTML = 
    `<div class="error">❌ Ошибка: ${msg}<br><small>Проверь консоль (F12)</small></div>`;
}

async function loadTracks() {
  try {    log('Подключение к API...');
    const url = `https://api.jamendo.com/v3.0/tracks/?client_id=${API_KEY}&format=json&limit=10&imagesize=200&order=popularity_total`;
    
    log('Запрос: ' + url);
    const response = await fetch(url);
    log('Статус: ' + response.status);
    
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }
    
    const data = await response.json();
    log('Получено треков: ' + (data.results ? data.results.length : 0));
    
    if (!data.results || data.results.length === 0) {
      throw new Error('API вернул пустой список');
    }
    
    renderTracks(data.results);
    log('Успех! Треки отображены');
    
  } catch (error) {
    log('Ошибка: ' + error.message);
    showError(error.message + '<br><br>Возможные причины:<br>' +
              '1. API ключ не работает<br>' +
              '2. Нет интернета<br>' +
              '3. Jamendo API недоступен');
  }
}

function renderTracks(tracks) {
  const container = document.getElementById('popular-list');
  container.innerHTML = '';
  
  tracks.forEach((track, i) => {
    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = `
      <img src="${track.image}" alt="">
      <div class="track-info">
        <div class="track-name">${track.name}</div>
        <div class="track-artist">${track.artist_name}</div>
      </div>
      <button class="btn" onclick="alert('Play: ${track.name}')">▶</button>
    `;
    container.appendChild(div);
  });
}

// Запуск при загрузкеlog('Страница загружена');
window.addEventListener('DOMContentLoaded', () => {
  log('DOM готов');
  loadTracks();
});
</script>

</body>
</html>
