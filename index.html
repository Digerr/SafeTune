<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeTune - Музыка без авторских прав</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d0d0d">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d; 
            color: #fff; 
            min-height: 100vh;
            padding-bottom: 150px;
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 24px 16px; 
            text-align: center;
            margin-bottom: 16px;
            border-radius: 12px;
        }
        .header h1 { font-size: 26px; margin-bottom: 6px; }
        .header p { opacity: 0.9; font-size: 14px; margin-bottom: 14px; }
        .search-box { 
            width: 100%; 
            padding: 12px 16px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            color: #000;
        }
        .genres { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto; 
            padding: 12px 0;
            margin-bottom: 16px;
            scrollbar-width: none;
        }
        .genres::-webkit-scrollbar { display: none; }
        .genre-btn { 
            flex-shrink: 0;
            padding: 10px 18px; 
            background: #1a1a1a;             border: 2px solid #333;
            color: #fff; 
            border-radius: 20px; 
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .genre-btn.active { 
            background: #667eea; 
            border-color: #667eea;
        }
        .tracks-list { display: flex; flex-direction: column; gap: 12px; }
        .track-card { 
            background: #1a1a1a; 
            padding: 16px; 
            border-radius: 12px;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }
        .track-card:active { transform: scale(0.98); background: #222; }
        .track-title { font-weight: 600; margin-bottom: 4px; font-size: 16px; }
        .track-artist { color: #888; font-size: 14px; margin-bottom: 8px; }
        .track-meta { display: flex; gap: 12px; font-size: 12px; color: #666; }
        .player { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0;
            background: #141414;
            border-top: 2px solid #667eea;
            padding: 14px 16px;
            z-index: 1000;
        }
        .player-info { 
            font-size: 14px; 
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ddd;
        }
        .player-controls { display: flex; align-items: center; gap: 14px; }
        .play-btn { 
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            background: #00d4ff;
            border: none; 
            color: #000;             font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(0,212,255,0.4);
        }
        .progress-container { flex: 1; }
        .progress-bar { 
            width: 100%; 
            height: 5px; 
            border-radius: 3px;
            background: #333;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            margin-top: -4px;
        }
        .progress-bar::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            border: none;
        }
        .time { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 4px; }
        .player-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
        .btn-small { padding: 6px 10px; background: #2a2a2a; border: 1px solid #444; color: #ccc; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .btn-small:active { background: #333; }
        .loading { text-align: center; padding: 40px 0; color: #888; font-size: 14px; }
        .error { text-align: center; padding: 20px; color: #ff6b6b; font-size: 14px; }
    </style>
</head>
<body><div class="container">
        <div class="header">
            <h1>🎵 SafeTune</h1>
            <p>Музыка без авторских прав v0.7.0</p>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск музыки или автора...">
        </div>

        <div class="genres">
            <button class="genre-btn active" data-genre="all">🔥 Всё</button>
            <button class="genre-btn" data-genre="rock">🎸 Рок</button>
            <button class="genre-btn" data-genre="pop">🎤 Поп</button>
            <button class="genre-btn" data-genre="electronic">🎛️ Электроника</button>
            <button class="genre-btn" data-genre="hiphop">🎧 Хип-хоп</button>
            <button class="genre-btn" data-genre="ambient">🌌 Эмбиент</button>
        </div>

        <div id="tracksContainer" class="tracks-list">
            <div class="loading">Загрузка треков...</div>
        </div>
</div><div class="player" id="player">
        <div class="player-info" id="playerInfo">Выберите трек для воспроизведения</div>
        <div class="player-controls">
            <button class="play-btn" id="playBtn">▶</button>
            <div class="progress-container">
                <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100">
                <div class="time">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        <div class="player-meta">
            <button class="btn-small" id="copyAttribution">📋 Атрибуция</button>
            <span id="trackMeta">Поток: 128 kbps</span>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio><script>
        const JAMENDO_CLIENT_ID = '64794605'; // Твой ключ уже встроен
        
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playerInfo = document.getElementById('playerInfo');
        const trackMeta = document.getElementById('trackMeta');
        const tracksContainer = document.getElementById('tracksContainer');
        const searchInput = document.getElementById('searchInput');
        const genreBtns = document.querySelectorAll('.genre-btn');
        const copyBtn = document.getElementById('copyAttribution');
        
        let currentTrack = null;
        let isPlaying = false;

        async function loadTracks(query = '', genre = 'all') {
            tracksContainer.innerHTML = '<div class="loading">Загрузка треков...</div>';
            
            try {
                let url = `https://api.jamendo.com/v3.0/tracks/?client_id=${JAMENDO_CLIENT_ID}&format=json&limit=25&audioformat=mp32&imagesize=300`;
                
                if (query) {
                    url += `&search=${encodeURIComponent(query)}`;
                } else if (genre !== 'all') {
                    url += `&tags=${genre}`;
                } else {
                    url += '&order=popularity_week';
                }
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('API недоступен');
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    displayTracks(data.results);
                } else {
                    tracksContainer.innerHTML = '<div class="loading">Ничего не найдено</div>';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                tracksContainer.innerHTML = '<div class="error">Ошибка загрузки. Проверь интернет или ключ.</div>';
            }
        }

        function displayTracks(tracks) {
            tracksContainer.innerHTML = '';
            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <div class="track-title">${escapeHtml(track.name)}</div>
                    <div class="track-artist">${escapeHtml(track.artist_name)}</div>
                    <div class="track-meta">
                        <span>⏱️ ${formatTime(track.duration)}</span>
                        <span>🎵 ${escapeHtml(track.album_name || 'Сингл')}</span>
                    </div>
                `;
                card.addEventListener('click', () => playTrack(track));
                tracksContainer.appendChild(card);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }function playTrack(track) {
            currentTrack = track;
            // Jamendo отдаёт полные ссылки, но добавим проверку на всякий случай
            audio.src = track.audio.startsWith('http') ? track.audio : `https:${track.audio}`;
            
            playerInfo.textContent = `${escapeHtml(track.name)} — ${escapeHtml(track.artist_name)}`;
            trackMeta.textContent = `Поток: 256 kbps | BPM: ${track.bpm || '—'}`;
            
            audio.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '';
            }).catch(err => {
                console.warn('Автоплей заблокирован:', err);
                playBtn.textContent = '▶';
                isPlaying = false;
            });
        }

        playBtn.addEventListener('click', () => {
            if (!currentTrack) {
                alert('Сначала выбери трек из списка');
                return;
            }
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                audio.play().catch(e => console.warn(e));
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progress;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        });

        progressBar.addEventListener('input', (e) => {
            if (audio.duration) {
                audio.currentTime = (e.target.value / 100) * audio.duration;
            }
        });

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadTracks(e.target.value.trim()), 600);
        });

        genreBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                genreBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadTracks('', btn.dataset.genre);
            });
        });

        copyBtn.addEventListener('click', () => {
            if (!currentTrack) return;
            const text = `Music: ${currentTrack.name} by ${currentTrack.artist_name}\nLicense: CC BY-NC 3.0\nSource: Jamendo.com`;
            navigator.clipboard.writeText(text).then(() => {
                const old = copyBtn.textContent;
                copyBtn.textContent = '✅ Скопировано';
                setTimeout(() => copyBtn.textContent = old, 2000);
            }).catch(() => alert('Не удалось скопировать'));
        });

        function formatTime(sec) {
            if (isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Запуск
        loadTracks();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
