<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>SafeTune</title>
  <style>
    :root {
      --bg: #0a0a0a; --surface: #161616; --surface2: #1f1f1f;
      --accent: #00e5ff; --text: #ffffff; --text-sec: #888888;
      --radius: 12px;
    }
    body.sunset { --accent: #ff7b00; }
    body.matrix { --accent: #00ff41; }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding-bottom: 90px; }

    header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #222; }
    .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
    .theme-btn { background: var(--surface2); border: none; color: var(--text-sec); padding: 8px 12px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; }
    
    .theme-menu { display: none; position: absolute; top: 60px; right: 20px; background: var(--surface2); border-radius: 10px; padding: 10px; border: 1px solid #333; z-index: 20; }
    .theme-menu.open { display: block; }
    .theme-opt { padding: 10px 15px; cursor: pointer; border-radius: 5px; }

    main { padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 5px; font-size: 2rem; }
    h1 span { color: var(--accent); }
    p.sub { text-align: center; color: var(--text-sec); margin-bottom: 25px; }

    .section-title { font-size: 1.1rem; font-weight: bold; margin: 20px 0 10px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 15px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: var(--surface2); padding: 8px 16px; border-radius: 20px; white-space: nowrap; color: var(--text-sec); cursor: pointer; font-size: 0.9rem; border: 1px solid transparent; }
    .tab.active { background: var(--accent); color: #000; font-weight: bold; }

    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { flex: 1; background: var(--surface2); border: 1px solid #333; padding: 12px; border-radius: var(--radius); color: #fff; font-size: 1rem; outline: none; }
    .search-box button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: var(--radius); font-weight: bold; cursor: pointer; font-size: 1.2rem; }

    /* Track List */
    .track { display: flex; align-items: center; gap: 12px; background: var(--surface); padding: 10px; border-radius: var(--radius); margin-bottom: 8px; }
    .track img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    .info { flex: 1; min-width: 0; }
    .name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .artist { color: var(--text-sec); font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .actions { display: flex; gap: 8px; align-items: center; }    
    .btn-icon { background: var(--surface2); border: none; color: var(--text); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; }
    .btn-play { background: var(--accent); color: #000; }
    .btn-fav.active { color: #ff4545; }

    /* Mini Player Bar */
    .player-bar { 
      position: fixed; bottom: 0; left: 0; right: 0; 
      background: #181818; border-top: 1px solid #333; 
      padding: 10px 15px; 
      display: none; align-items: center; gap: 12px; 
      z-index: 50; cursor: pointer; 
      box-shadow: 0 -5px 15px rgba(0,0,0,0.5); 
    }
    .player-bar.active { display: flex; }
    .p-img { width: 45px; height: 45px; border-radius: 6px; flex-shrink: 0; }
    .p-info { flex: 1; min-width: 0; }
    .p-name { font-size: 0.9rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-art { font-size: 0.75rem; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .p-controls { display: flex; align-items: center; gap: 15px; }
    .p-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; }
    .p-btn-play { background: var(--accent); color: #000; border-radius: 50%; width: 36px; height: 36px; }

    /* Full Modal Player */
    .modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .modal.open { display: flex; }
    .close-modal { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-sec); font-size: 2rem; cursor: pointer; z-index: 101; }
    .m-cover { width: 85%; max-width: 320px; aspect-ratio: 1; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); object-fit: cover; }
    .m-title { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 5px; }
    .m-artist { color: var(--text-sec); margin-bottom: 30px; font-size: 1rem; }
    
    .eq-box { display: flex; gap: 4px; height: 20px; align-items: flex-end; margin-bottom: 25px; }
    .bar { width: 4px; background: var(--accent); height: 4px; border-radius: 2px; }
    .playing .bar { animation: bounce 0.8s infinite ease-in-out alternate; }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: 0.2s; }
    .bar:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0% { height: 4px; } 100% { height: 20px; } }

    .modal-controls { display: flex; gap: 40px; align-items: center; margin-bottom: 30px; }
    .modal-btn { background: none; border: none; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-btn-lg { width: 70px; height: 70px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    .progress-bar { width: 100%; max-width: 350px; display: flex; align-items: center; gap: 12px; }
    .time { font-size: 0.8rem; color: var(--text-sec); font-family: monospace; min-width: 40px; text-align: center; }
    input[type=range] { flex: 1; height: 4px; -webkit-appearance: none; background: #333; border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; }

    .loading { text-align: center; padding: 40px; color: var(--text-sec); }  </style>
</head>
<body>

<header>
  <div class="logo">🎵 SafeTune</div>
  <button class="theme-btn" onclick="toggleMenu()">🎨 Тема</button>
  <div class="theme-menu" id="themeMenu">
    <div class="theme-opt" onclick="setTheme('')">🔵 Синяя</div>
    <div class="theme-opt" onclick="setTheme('sunset')">🟠 Оранжевая</div>
    <div class="theme-opt" onclick="setTheme('matrix')">🟢 Матрица</div>
  </div>
</header>

<main>
  <h1>Safe<span>Tune</span></h1>
  <p class="sub">Музыка для твоего контента</p>

  <div class="section-title">🔥 Популярное сейчас</div>
  <div id="popular-list"><div class="loading">Загрузка...</div></div>

  <div class="section-title">🎵 Жанры</div>
  <div class="tabs" id="tabs">
    <div class="tab active" onclick="searchGenre('')">🔥 Все</div>
    <div class="tab" onclick="searchGenre('Rock')">🎸 Рок</div>
    <div class="tab" onclick="searchGenre('Pop')">🎤 Поп</div>
    <div class="tab" onclick="searchGenre('Electronic')">🎛️ Электро</div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Поиск...">
    <button onclick="doSearch()">🔍</button>
  </div>

  <div id="search-results"></div>
</main>

<!-- Mini Player -->
<div class="player-bar" id="miniPlayer" onclick="openFullPlayer()">
  <img id="miniImg" class="p-img" src="">
  <div class="p-info">
    <div class="p-name" id="miniName">—</div>
    <div class="p-art" id="miniArt">—</div>
  </div>
  <div class="p-controls" onclick="event.stopPropagation()">
    <button class="p-btn p-btn-play" id="miniPlayBtn">▶</button>
    <button class="p-btn" onclick="playNext()">⏭</button>
  </div>
</div>
<!-- Full Modal -->
<div class="modal" id="fullPlayer">
  <button class="close-modal" onclick="closeFullPlayer()">✕</button>
  <img id="fullImg" class="m-cover" src="">
  <div class="eq-box" id="eqBox">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <div class="m-title" id="fullName">—</div>
  <div class="m-artist" id="fullArt">—</div>
  
  <div class="modal-controls">
    <button class="modal-btn" onclick="playPrev()">⏮</button>
    <button class="modal-btn modal-btn-lg" onclick="togglePlay()" id="fullPlayBtn">▶</button>
    <button class="modal-btn" onclick="playNext()">⏭</button>
  </div>

  <div class="progress-bar">
    <span class="time" id="curTime">0:00</span>
    <input type="range" id="seekBar" value="0">
    <span class="time" id="durTime">0:00</span>
  </div>
</div>

<audio id="audio"></audio>

<script>
  const API_KEY = '64794605';
  let tracks = [], currentIdx = -1, isPlaying = false;
  let favorites = JSON.parse(localStorage.getItem('favs') || '[]');
  let activeTrackId = null;

  window.onload = () => {
    const savedTheme = localStorage.getItem('theme') || '';
    document.body.className = savedTheme;
    loadPopular();
  };

  function toggleMenu() { document.getElementById('themeMenu').classList.toggle('open'); }
  function setTheme(t) { document.body.className = t; localStorage.setItem('theme', t); toggleMenu(); }

  async function loadPopular() {
    await fetchTracks(`https://api.jamendo.com/v3.0/tracks/?client_id=${API_KEY}&format=json&limit=10&order=popularity_total`, 'popular-list');
  }

  async function searchGenre(genre) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    await fetchTracks(`https://api.jamendo.com/v3.0/tracks/?client_id=${API_KEY}&format=json&limit=20&search=${genre}&order=popularity_total`, 'search-results');
  }
  async function doSearch() {
    const q = document.getElementById('searchInput').value;
    if(!q) return;
    await fetchTracks(`https://api.jamendo.com/v3.0/tracks/?client_id=${API_KEY}&format=json&limit=20&search=${q}&order=popularity_total`, 'search-results');
  }

  async function fetchTracks(url, targetId) {
    const el = document.getElementById(targetId);
    el.innerHTML = '<div class="loading">Загрузка...</div>';
    try {
      const res = await fetch(url);
      const data = await res.json();
      tracks = data.results || [];
      el.innerHTML = tracks.map((t, i) => renderTrack(t, i)).join('');
    } catch(e) { el.innerHTML = '<div class="loading">Ошибка</div>'; }
  }

  function renderTrack(t, i) {
    const isFav = favorites.includes(t.id);
    return `
      <div class="track">
        <img src="${t.image}">
        <div class="info">
          <div class="name">${t.name}</div>
          <div class="artist">${t.artist_name}</div>
        </div>
        <div class="actions">
          <button class="btn-icon btn-fav ${isFav?'active':''}" onclick="toggleFav(${t.id}, this)">♥</button>
          <button class="btn-icon btn-play" onclick="playTrack(${i})">▶</button>
          <button class="btn-icon" onclick="download('${t.audiodownload}', '${t.name.replace(/'/g,"")}')">⬇</button>
        </div>
      </div>`;
  }

  function toggleFav(id, btn) {
    if(favorites.includes(id)) { favorites = favorites.filter(x => x!==id); btn.classList.remove('active'); }
    else { favorites.push(id); btn.classList.add('active'); }
    localStorage.setItem('favs', JSON.stringify(favorites));
  }

  // --- AUDIO LOGIC ---
  window.playTrack = function(index) {
    if(index >= 0 && index < tracks.length) {
      const track = tracks[index];
      currentIdx = index;
      activeTrackId = track.id;
      
      const audio = document.getElementById('audio');
      audio.src = track.audio;
      audio.play().catch(e => console.error("Play error:", e));      
      isPlaying = true;
      updateUI(track);
      updatePlayButtons();
    }
  };

  function updateUI(t) {
    document.getElementById('miniName').textContent = t.name;
    document.getElementById('miniArt').textContent = t.artist_name;
    document.getElementById('miniImg').src = t.image;
    document.getElementById('fullName').textContent = t.name;
    document.getElementById('fullArt').textContent = t.artist_name;
    document.getElementById('fullImg').src = t.image;
    document.getElementById('miniPlayer').classList.add('active');
  }

  function updatePlayButtons() {
    const icon = isPlaying ? '⏸' : '▶';
    document.getElementById('miniPlayBtn').textContent = icon;
    document.getElementById('fullPlayBtn').textContent = icon;
    
    const modal = document.getElementById('fullPlayer');
    if(isPlaying) modal.classList.add('playing');
    else modal.classList.remove('playing');
    
    // Update list buttons
    document.querySelectorAll('.btn-play').forEach((btn, i) => {
      // Simple logic: if playing, show pause on active track
      // In a real app we'd match IDs, but here index is simpler for demo
      btn.textContent = (i === currentIdx && isPlaying) ? '⏸' : '▶';
    });
  }

  window.togglePlay = function() {
    const audio = document.getElementById('audio');
    if(!audio.src) return;
    if(audio.paused) { 
      audio.play(); isPlaying = true; 
    } else { 
      audio.pause(); isPlaying = false; 
    }
    updatePlayButtons();
  };

  window.playNext = function() {
    if(currentIdx < tracks.length - 1) playTrack(currentIdx + 1);
  };
  
  window.playPrev = function() {    if(currentIdx > 0) playTrack(currentIdx - 1);
  };

  document.getElementById('audio').onended = window.playNext;
  
  const audio = document.getElementById('audio');
  const seekBar = document.getElementById('seekBar');
  
  audio.ontimeupdate = () => {
    if(audio.duration) {
      seekBar.value = (audio.currentTime / audio.duration) * 100;
      document.getElementById('curTime').textContent = formatTime(audio.currentTime);
      document.getElementById('durTime').textContent = formatTime(audio.duration);
    }
  };
  
  seekBar.oninput = () => {
    if(audio.duration) audio.currentTime = (seekBar.value / 100) * audio.duration;
  };

  function formatTime(s) {
    const m = Math.floor(s/60);
    const sec = Math.floor(s%60);
    return m + ':' + (sec<10?'0':'') + sec;
  }

  window.openFullPlayer = function() { document.getElementById('fullPlayer').classList.add('open'); };
  window.closeFullPlayer = function() { document.getElementById('fullPlayer').classList.remove('open'); };

  window.download = function(url, name) {
    if(!url) return;
    const a = document.createElement('a');
    a.href = url;
    a.download = name + '.mp3';
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
</script>

</body>
</html>
