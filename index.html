<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeTune</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;min-height:100vh}
header{padding:15px;background:#111;border-bottom:1px solid #222;position:sticky;top:0}
.logo{font-size:1.5rem;font-weight:bold;color:#00e5ff;text-align:center}
main{padding:20px;max-width:800px;margin:0 auto}
h1{text-align:center;margin:20px 0;color:#00e5ff}
.section{margin:25px 0}
.section-title{font-size:1.2rem;margin-bottom:15px;color:#00e5ff;border-left:3px solid #00e5ff;padding-left:10px}
.track{background:#1a1a1a;padding:12px;margin-bottom:10px;border-radius:8px;display:flex;align-items:center;gap:12px}
.track img{width:50px;height:50px;border-radius:6px;object-fit:cover}
.track-info{flex:1;min-width:0}
.track-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{color:#999;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{background:#00e5ff;color:#000;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:bold}
.loading{text-align:center;padding:40px;color:#666}
</style>
</head>
<body>

<header><div class="logo">🎵 SafeTune</div></header>

<main>
  <h1>Safe<span style="color:#00e5ff">Tune</span></h1>
  
  <div class="section">
    <div class="section-title">🔥 Популярное сейчас</div>
    <div id="list"><div class="loading">Загрузка треков...</div></div>
  </div>
</main>

<script>
const API='64794605';

async function load(){
  try{
    const url=`https://api.jamendo.com/v3.0/tracks/?client_id=${API}&format=json&limit=20&imagesize=200&order=popularity_total`;
    const res=await fetch(url);
    const data=await res.json();
    
    if(!data.results||data.results.length===0){
      document.getElementById('list').innerHTML='<div class="loading">Нет треков</div>';
      return;
    }
    
    let html='';
    data.results.forEach(t=>{
      html+=`
        <div class="track">
          <img src="${t.image}">
          <div class="track-info">
            <div class="track-name">${t.name}</div>
            <div class="track-artist">${t.artist_name}</div>
          </div>
          <button class="btn" onclick="play('${t.audio}')">▶</button>
        </div>
      `;
    });
    document.getElementById('list').innerHTML=html;
  }catch(e){
    document.getElementById('list').innerHTML='<div class="loading">Ошибка: '+e.message+'</div>';
  }
}

function play(url){
  if(url){
    const a=document.createElement('a');
    a.href=url;
    a.target='_blank';
    a.click();
  }
}

load();
</script>

</body>
</html>
